apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-batch-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-batch-service
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-batch-service
    spec:
      containers:
        - name: batch
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "services/batch-service/server.js"]
          ports:
            - containerPort: 4001
          env:
            - name: OTEL_SERVICE_NAME
              value: nova-batch-service
            - name: PORT
              value: "4001"
            - name: NOVA_SITE
              value: {{ .Values.novaSite | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:4318"
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: ""
            - name: DT_TENANT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-otel
                  key: dt-tenant-url
            - name: DT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-otel
                  key: dt-api-token
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-batch-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-batch-service
  ports:
    - port: 4001
      targetPort: 4001
