# Nova MES on Kubernetes (GKE).
#
# Deploys the three services + load generator + postgres into the `nova-mes` namespace.
# The app sends OTLP to otel-collector:4318 (see k8s/otel-collector.yaml),
# which forwards to Dynatrace. No OneAgent required.
#
# Deploy:
#   1. kubectl create namespace nova-mes
#   2. kubectl -n nova-mes create secret generic nova-mes-otel \
#        --from-literal=otlp-endpoint="http://otel-collector:4318" \
#        --from-literal=otlp-headers="" \
#        --from-literal=tenant-url="https://<env>.live.dynatrace.com" \
#        --from-literal=api-token="dt0c01.XXXX" \
#        --from-literal=dt-endpoint="https://<env>.live.dynatrace.com/api/v2/otlp"
#   3. kubectl apply -f k8s/
#
# Note: nova-postgres uses an emptyDir volume — data is seeded on pod startup.
# Restart the pod to reset to seed data.
---
apiVersion: v1
kind: Namespace
metadata:
  name: nova-mes
---
apiVersion: v1
kind: Secret
metadata:
  name: nova-mes-postgres
  namespace: nova-mes
type: Opaque
stringData:
  password: nova_mes_demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-postgres
  namespace: nova-mes
spec:
  replicas: 1
  selector: { matchLabels: { app: nova-postgres } }
  template:
    metadata:
      labels: { app: nova-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          command: ["postgres", "-c", "shared_memory_type=mmap"]
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: nova_mes }
            - { name: POSTGRES_USER, value: nova_mes }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: nova-mes-postgres, key: password } }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nova_mes"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: nova-postgres, namespace: nova-mes }
spec:
  selector: { app: nova-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-batch-service
  namespace: nova-mes
spec:
  replicas: 1
  selector: { matchLabels: { app: nova-batch-service } }
  template:
    metadata:
      labels: { app: nova-batch-service }
    spec:
      containers:
        - name: batch
          image: us-central1-docker.pkg.dev/sales-engineering-emea/nova-mes/nova-mes:latest
          imagePullPolicy: Always
          command: ["node", "services/batch-service/server.js"]
          ports: [{ containerPort: 4001 }]
          env:
            - { name: OTEL_SERVICE_NAME, value: nova-batch-service }
            - { name: PORT, value: "4001" }
            - { name: NOVA_SITE, value: Northgate }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: otlp-endpoint } }
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: otlp-headers } }
            - name: DT_TENANT_URL
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: tenant-url } }
            - name: DT_API_TOKEN
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: api-token } }
---
apiVersion: v1
kind: Service
metadata: { name: nova-batch-service, namespace: nova-mes }
spec:
  selector: { app: nova-batch-service }
  ports: [{ port: 4001, targetPort: 4001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-dispensing-service
  namespace: nova-mes
spec:
  replicas: 1
  selector: { matchLabels: { app: nova-dispensing-service } }
  template:
    metadata:
      labels: { app: nova-dispensing-service }
    spec:
      containers:
        - name: dispensing
          image: us-central1-docker.pkg.dev/sales-engineering-emea/nova-mes/nova-mes:latest
          imagePullPolicy: Always
          command: ["node", "services/dispensing-service/server.js"]
          ports: [{ containerPort: 4002 }]
          env:
            - { name: OTEL_SERVICE_NAME, value: nova-dispensing-service }
            - { name: PORT, value: "4002" }
            - { name: NOVA_SITE, value: Northgate }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: otlp-endpoint } }
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: otlp-headers } }
            - name: DT_TENANT_URL
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: tenant-url } }
            - name: DT_API_TOKEN
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: api-token } }
---
apiVersion: v1
kind: Service
metadata: { name: nova-dispensing-service, namespace: nova-mes }
spec:
  selector: { app: nova-dispensing-service }
  ports: [{ port: 4002, targetPort: 4002 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-mes-web
  namespace: nova-mes
spec:
  replicas: 1
  selector: { matchLabels: { app: nova-mes-web } }
  template:
    metadata:
      labels: { app: nova-mes-web }
    spec:
      containers:
        - name: web
          image: us-central1-docker.pkg.dev/sales-engineering-emea/nova-mes/nova-mes:latest
          imagePullPolicy: Always
          command: ["node", "services/mes-web/server.js"]
          ports: [{ containerPort: 4000 }]
          env:
            - { name: OTEL_SERVICE_NAME, value: nova-mes-web }
            - { name: PORT, value: "4000" }
            - { name: NOVA_SITE, value: Northgate }
            - { name: BATCH_SVC_URL, value: "http://nova-batch-service:4001" }
            - { name: DISPENSING_SVC_URL, value: "http://nova-dispensing-service:4002" }
            - { name: RUM_OTLP_TARGET, value: "http://otel-collector:4318" }
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: otlp-endpoint } }
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: otlp-headers } }
            - name: DT_TENANT_URL
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: tenant-url } }
            - name: DT_API_TOKEN
              valueFrom: { secretKeyRef: { name: nova-mes-otel, key: api-token } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: nova-mes-postgres, key: password } }
            - { name: DATABASE_URL, value: "postgresql://nova_mes:$(POSTGRES_PASSWORD)@nova-postgres:5432/nova_mes" }
---
apiVersion: v1
kind: Service
metadata: { name: nova-mes-web, namespace: nova-mes }
spec:
  type: LoadBalancer
  selector: { app: nova-mes-web }
  ports: [{ port: 80, targetPort: 4000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-loadgen
  namespace: nova-mes
spec:
  replicas: 1
  selector: { matchLabels: { app: nova-loadgen } }
  template:
    metadata:
      labels: { app: nova-loadgen }
    spec:
      containers:
        - name: loadgen
          image: us-central1-docker.pkg.dev/sales-engineering-emea/nova-mes/nova-mes:latest
          imagePullPolicy: Always
          command: ["node", "loadgen/loadgen.js"]
          env:
            - { name: TARGET, value: "http://nova-mes-web:4000" }
            - { name: RPS, value: "2" }
            - { name: RELEASE_MIX, value: "0.4" }
