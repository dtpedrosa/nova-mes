<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova Pharma MES</title>
  <!--
    Real User Monitoring is provided by the OpenTelemetry Web SDK (rum-otel.js),
    NOT by OneAgent. The browser is instrumented as a first-class OTel tier and
    exports OTLP traces (page load, fetch/XHR, user actions, JS errors) to the
    same-origin /otlp-proxy, which forwards to the OpenTelemetry Collector and on
    to Dynatrace. W3C trace context links browser spans to backend spans.
  -->
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="/rum-otel.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="dot"></span> Nova Pharma <strong>MES</strong></div>
    <div class="site">Site: Northgate · Line 2 / Line 3</div>
    <div id="health" class="health ok">System healthy</div>
  </header>

  <div class="layout-body">
    <nav class="sidebar">
      <a href="#dashboard"   class="nav-item" data-page="dashboard">Dashboard</a>
      <a href="#batches"     class="nav-item" data-page="batches">Batch Records</a>
      <a href="#work-orders" class="nav-item" data-page="work-orders">Work Orders</a>
      <a href="#equipment"   class="nav-item" data-page="equipment">Equipment</a>
      <a href="#deviations"  class="nav-item" data-page="deviations">Deviations</a>
      <div class="nav-sep"></div>
      <a href="#control"     class="nav-item" data-page="control">Control Panel</a>
    </nav>
    <main id="content" class="content-area">
      <!-- page content injected by router in app.js -->
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
